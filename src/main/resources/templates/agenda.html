<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Agenda - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/agenda.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <ul class="sidebar-menu">
            <li><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li class="active"><a href="/agenda"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li><a href="/midia"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamentos"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>
        <div class="sidebar-user">
            <form th:action="@{/logout}" method="POST">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit"><i class="fas fa-sign-out-alt"></i> Sair</button>
            </form>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Agenda</h1>
            <button class="btn-agendar" onclick="abrirModalAgendamento()"><i class="fas fa-plus"></i> Novo Agendamento</button>
        </div>

        <div class="agenda-wrapper">
            <div class="calendar-section">
                <div class="calendar-header-nav">
                    <i class="fas fa-chevron-left nav-seta" onclick="mudarMes(-1)"></i>
                    <h2 id="mesAnoAtual"></h2>
                    <i class="fas fa-chevron-right nav-seta" onclick="mudarMes(1)"></i>
                </div>
                <div class="weekdays"><div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div></div>
                <div class="days-grid" id="diasCalendario"></div>
            </div>

            <div class="appointments-section">
                <h3 id="tituloDiaCompromisso"></h3>
                <ul class="compromissos-list" id="listaCompromissos"></ul>
            </div>
        </div>
    </main>
</div>

<div id="modalAgendamento" class="modal-form-overlay">
    <div class="modal-form-content">
        <h3>Novo Agendamento</h3>
        <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
            <input type="text" id="inputTitulo" placeholder="Título" required>
            <textarea id="inputDescricao" placeholder="Descrição"></textarea>
            <input type="date" id="inputData" required>
            <div style="display:flex; gap:10px;">
                <input type="time" id="inputHoraInicio" required>
                <input type="time" id="inputHoraFim" required>
            </div>
            <input type="text" id="inputEvento" placeholder="Local/Evento" required>
            <button type="submit" class="btn-salvar">Confirmar</button>
        </form>
    </div>
</div>

<script>
    let compromissos = [];
    let dataAtual = new Date();
    let mesAtual = dataAtual.getMonth();
    let anoAtual = dataAtual.getFullYear();

    async function carregarAgenda() {
        const res = await fetch("/agenda/dados");
        compromissos = await res.json();
        renderizarCalendario();
    }

    async function salvarAgendamento(event) {
        event.preventDefault();
        const atividade = {
            titulo: document.getElementById("inputTitulo").value,
            descricao: document.getElementById("inputDescricao").value,
            evento: document.getElementById("inputEvento").value,
            data: document.getElementById("inputData").value,
            horario: document.getElementById("inputHoraInicio").value + " - " + document.getElementById("inputHoraFim").value
        };

        const response = await fetch("/agenda", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(atividade)
        });

        if (response.ok) {
            document.getElementById("modalAgendamento").style.display = "none";
            document.getElementById("formAgendamento").reset();
            await carregarAgenda();
        }
    }

    function renderizarCalendario() {
        const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        document.getElementById("mesAnoAtual").innerText = `${meses[mesAtual]} ${anoAtual}`;
        const grid = document.getElementById("diasCalendario");
        grid.innerHTML = "";
        const ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
        for (let i = 1; i <= ultimoDia; i++) {
            grid.innerHTML += `<div class="day" onclick="selecionarDia(${i})">${i}</div>`;
        }
    }

    function selecionarDia(dia) {
        document.getElementById("tituloDiaCompromisso").innerText = dia + " de " + mesAtual;
        // Lógica para filtrar listaCompromissos aqui
    }

    function mudarMes(direcao) {
        mesAtual += direcao;
        if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
        if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
        renderizarCalendario();
    }

    function abrirModalAgendamento() { document.getElementById("modalAgendamento").style.display = "flex"; }

    carregarAgenda();
</script>
</body>
</html>
