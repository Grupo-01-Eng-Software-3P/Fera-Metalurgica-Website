<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>400 - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body class="login-body">

<div class="login-wrapper">
    <div class="login-card">

        <div class="login-left">
            <div class="login-form-container">
                <h1 class="login-logo">400</h1>
                <p class="login-subtitle">Requisição inválida</p>

                <p style="text-align: center; color: #A09A92; font-size: 15px; margin-bottom: 40px;"
                   th:text="${mensagem} ?: 'Verifique os dados e tente novamente.'"></p>

                <a href="/">
                    <button type="button" class="btn-entrar">Voltar ao início</button>
                </a>
            </div>
        </div>

        <div class="login-right">
            <h2>Ops!</h2>
            <p>Um erro aconteceu.</p>
        </div>

    </div>
</div>

</body>
</html>
