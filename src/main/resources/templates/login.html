<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Login - Fera</title>
  <link rel="stylesheet" th:href="@{/css/global.css}">
  <link rel="stylesheet" th:href="@{/css/layout.css}">
  <link rel="stylesheet" th:href="@{/css/pages/login.css}">
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-card">

    <div class="login-left">
      <div class="login-form-container">
        <h1 class="login-logo">FERA</h1>

        <form th:action="@{/login}" method="POST">

          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

          <div th:if="${param.error}" style="background-color: #ffcccc; color: #cc0000; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold;">
            <span>E-mail ou senha inválidos</span>
          </div>

          <div class="input-group">
            <label>E-mail Corporativo</label>
            <input type="email" name="email" class="input-gray" placeholder="admin@fera.com" required>
          </div>

          <div class="input-group">
            <label>Senha de Acesso</label>
            <input type="password" name="password" class="input-gray" required>
          </div>

          <button type="submit" class="btn-black-pill" style="width: 100%; margin-top: 20px;">Entrar no sistema</button>
        </form>
      </div>
    </div>

    <div class="login-right">
      <h2>Bem Vindo!</h2>
      <p>Do sonho à solda,<br>da ideia à estrutura.</p>
    </div>

  </div>
</div>

</body>
</html>
