<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mídia - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/midia.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">Metalúrgica & Móveis</p>
        <ul class="sidebar-menu">
            <li><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="/agenda"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li class="active"><a href="/midia"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamentos"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>
        <div class="sidebar-user">
            <i class="fas fa-user-circle"></i>
            Lucas Stibbe
            <form th:action="@{/logout}" method="POST" style="display:inline;">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}">

                <button type="submit" style="background:none; border:none; color:inherit; cursor:pointer;">
                    <i class="fas fa-cog config-icon"></i>
                </button>

            </form>
        </div>
    </aside>

    <main class="main-content">

        <div class="midia-header">
            <h2 class="page-title">Mídia</h2>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="inputBusca" onkeyup="filtrarCategorias()" placeholder="Buscar mídia...">
                    <i class="fas fa-search"></i>
                </div>
                <button class="btn-nova-categoria" onclick="abrirModalCategoria()">+ Nova Categoria</button>
            </div>
        </div>

        <div class="filter-container">
            <button class="filter-pill active" onclick="ativarFiltro(this)">Todas</button>
            <button class="filter-pill" onclick="ativarFiltro(this)">Categorias</button>
            <button class="filter-pill" onclick="ativarFiltro(this)">Produtos</button>
            <button class="filter-pill" onclick="ativarFiltro(this)">Vídeos</button>
        </div>

        <div class="categorias-lista" id="categoriaLista">

            <!-- Sem categorias cadastradas -->
            <div th:if="${#lists.isEmpty(categorias)}"
                 style="text-align:center; padding: 60px; color: #aaa;">
                <i class="fas fa-folder-open" style="font-size: 48px; margin-bottom: 16px; display:block;"></i>
                <p style="font-size: 16px;">Nenhuma categoria cadastrada ainda.</p>
                <p style="font-size: 13px; margin-top: 6px;">Clique em <strong>+ Nova Categoria</strong> para começar.</p>
            </div>

            <!-- Lista do banco -->
            <a th:each="cat : ${categorias}"
               th:href="@{'/midia/' + ${cat.nome}}"
               class="categoria-item">
                <div class="categoria-carrossel-wrapper">
                    <!-- Se tiver mídias, mostra a primeira; senão mostra placeholder -->
                    <div class="carrossel-track">
                        <div th:if="${cat.midias != null and !cat.midias.isEmpty()}">
                            <img th:each="m : ${cat.midias}"
                                 th:src="@{${m.caminho}}"
                                 th:alt="${m.nome}"
                                 style="min-width:100%;height:220px;object-fit:cover;">
                        </div>
                        <div th:if="${cat.midias == null or cat.midias.isEmpty()}"
                             style="min-width:100%;height:220px;background:#f0ece8;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:48px;">
                            <i class="fas fa-images"></i>
                        </div>
                    </div>
                </div>
                <div class="categoria-footer">
                    <span class="categoria-nome">
                        <i class="fas fa-pencil-alt"></i>
                        <span th:text="${cat.nome}"></span>
                    </span>
                    <span class="categoria-meta"
                          th:text="${cat.midias != null ? cat.midias.size() + ' arquivo(s)' : '0 arquivo(s)'}">
                    </span>
                </div>
            </a>

        </div>
    </main>
</div>

<!-- MODAL NOVA CATEGORIA -->
<div id="modalCategoria" class="modal-form-overlay">
    <div class="modal-form-content">
        <h3 style="color: var(--fera-orange); margin-bottom: 20px;">Nova Categoria</h3>
        <form th:action="@{/nova-categoria}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <div class="input-group">
                <label>Nome da Categoria:</label>
                <input type="text" name="nome" class="input-field" placeholder="Ex: Sala de Estar" required>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn-secondary-outline" onclick="fecharModalCategoria()">Cancelar</button>
                <button type="submit" class="btn-primary">Criar Categoria</button>
            </div>
        </form>
    </div>
</div>

<script>
    function ativarFiltro(btn) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }

    function filtrarCategorias() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        document.querySelectorAll('.categoria-item').forEach(item => {
            const nome = item.querySelector('.categoria-nome').textContent.toLowerCase();
            item.style.display = nome.includes(termo) ? '' : 'none';
        });
    }

    function abrirModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'flex';
    }
    function fecharModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'none';
    }
    window.onclick = function(e) {
        const m = document.getElementById('modalCategoria');
        if (e.target === m) m.style.display = 'none';
    };
</script>

</body>
</html>
