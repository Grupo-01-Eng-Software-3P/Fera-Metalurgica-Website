<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Agenda - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/agenda.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">Metalúrgica & Móveis</p>
        <ul class="sidebar-menu">
            <li><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li class="active"><a href="/agenda"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li><a href="#"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamento"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>
        <div class="sidebar-user">
            <i class="fas fa-user-circle"></i> Lucas Stibbe <i class="fas fa-cog config-icon"></i>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title" style="font-size: 32px;">Agenda</h1>
            <div class="header-actions">
                <button class="btn-agendar" onclick="abrirModalAgendamento()">
                    <i class="fas fa-plus"></i> Novo Agendamento
                </button>
            </div>
        </div>

        <div class="agenda-wrapper">

            <div class="calendar-section">
                <div class="calendar-header-nav">
                    <i class="fas fa-chevron-left nav-seta" onclick="mudarMes(-1)"></i>
                    <h2 id="mesAnoAtual">Maio 2026</h2>
                    <i class="fas fa-chevron-right nav-seta" onclick="mudarMes(1)"></i>
                </div>

                <div class="weekdays">
                    <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
                </div>

                <div class="days-grid" id="diasCalendario"></div>
            </div>

            <div class="appointments-section">
                <h3 id="tituloDiaCompromisso">14 de Maio</h3>
                <p id="subtituloDia" style="color: #888; margin-bottom: 25px; font-weight: 500;">Quinta-feira</p>

                <ul class="compromissos-list" id="listaCompromissos">
                </ul>
            </div>

        </div>
    </main>
</div>

<div id="modalAgendamento" class="modal-form-overlay">
    <div class="modal-form-content modal-premium">
        <div class="modal-header">
            <h3><i class="fas fa-calendar-plus"></i> Novo Agendamento</h3>
            <span class="fechar-modal-x" onclick="fecharModalAgendamento()">&times;</span>
        </div>

        <form id="formAgendamento" onsubmit="salvarAgendamento(event)">
            <div class="form-row">
                <div class="input-group">
                    <label>Título do Compromisso</label>
                    <input type="text" id="inputTitulo" class="input-premium" placeholder="Ex: Entrega de Móvel Industrial" required>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Descrição / Observações</label>
                    <textarea id="inputDescricao" class="input-premium" rows="2" placeholder="Detalhes extras sobre o serviço..."></textarea>
                </div>
            </div>

            <div class="form-row split">
                <div class="input-group">
                    <label>Data</label>
                    <input type="date" id="inputData" class="input-premium" required>
                </div>
                <div class="input-group">
                    <label>Horário</label>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <input type="time" id="inputHoraInicio" class="input-premium" required>
                        <span style="font-weight: bold; color: #666;">até</span>
                        <input type="time" id="inputHoraFim" class="input-premium" required>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="input-group">
                    <label>Local ou Evento</label>
                    <input type="text" id="inputEvento" class="input-premium" placeholder="Ex: Galpão A ou Endereço do Cliente" required>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-cancelar" onclick="fecharModalAgendamento()">Cancelar</button>
                <button type="submit" class="btn-salvar">Confirmar Agendamento</button>
            </div>
        </form>
    </div>
</div>

<div id="modalDetalhes" class="modal-form-overlay">
    <div class="modal-form-content modal-premium">
        <div class="modal-header">
            <h3><i class="fas fa-calendar-check"></i> Detalhes do Compromisso</h3>
            <span class="fechar-modal-x" onclick="fecharDetalhes()">&times;</span>
        </div>

        <div style="padding: 30px 40px;">
            <h4 id="detalheTitulo" style="color: var(--fera-orange); font-size: 22px; margin-bottom: 20px;">Título do Evento</h4>

            <div style="display: flex; flex-direction: column; gap: 15px; font-size: 16px; color: var(--text-dark);">
                <p><strong><i class="fas fa-clock" style="color: #A09A92; width: 25px;"></i> Horário:</strong> <span id="detalheHorario"></span></p>
                <p><strong><i class="fas fa-calendar-day" style="color: #A09A92; width: 25px;"></i> Data:</strong> <span id="detalheData"></span></p>
                <p><strong><i class="fas fa-map-marker-alt" style="color: #A09A92; width: 25px;"></i> Local:</strong> <span id="detalheEvento"></span></p>

                <div style="background-color: #F8F8F8; padding: 15px; border-radius: 10px; margin-top: 10px;">
                    <strong style="display: block; margin-bottom: 5px;"><i class="fas fa-align-left" style="color: #A09A92;"></i> Descrição:</strong>
                    <span id="detalheDescricao" style="color: #666; font-size: 15px; line-height: 1.5;"></span>
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-salvar" onclick="fecharDetalhes()">Fechar</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. Mocks atualizados com descrição e evento
    const compromissosMocks = [
        { dataDia: new Date().getDate(), titulo: "Visita para realizar Orçamento e medidas", descricao: "Levar trena a laser e catálogo de MDF.", horario: "08:00h - 09:30h", evento: "Casa do Cliente", cor: "#007BFF" },
        { dataDia: new Date().getDate(), titulo: "Realizar entrega do móvel", descricao: "Ligar para o cliente 30 minutos antes de chegar.", horario: "10:40h - 12:00h", evento: "Condomínio Flores", cor: "#28A745" },
        { dataDia: 15, titulo: "Instalação do projeto", descricao: "Instalação dos armários da cozinha.", horario: "13:30h - 15:00h", evento: "Galpão Principal", cor: "#6F42C1" }
    ];

    let dataAtual = new Date();
    let mesAtual = dataAtual.getMonth();
    let anoAtual = dataAtual.getFullYear();
    let diaSelecionado = dataAtual.getDate();

    const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];

    // 2. Renderiza o Calendário e as Bolinhas
    function renderizarCalendario() {
        document.getElementById("mesAnoAtual").innerText = `${meses[mesAtual]} ${anoAtual}`;
        const grid = document.getElementById("diasCalendario");
        grid.innerHTML = "";

        const primeiroDia = new Date(anoAtual, mesAtual, 1).getDay();
        const ultimoDia = new Date(anoAtual, mesAtual + 1, 0).getDate();
        const ultimoDiaMesAnt = new Date(anoAtual, mesAtual, 0).getDate();

        for (let i = primeiroDia; i > 0; i--) {
            grid.innerHTML += `<div class="day inactive">${ultimoDiaMesAnt - i + 1}</div>`;
        }

        for (let i = 1; i <= ultimoDia; i++) {
            let classe = (i === diaSelecionado && mesAtual === new Date().getMonth()) ? "day active" : "day";
            let temCompromisso = compromissosMocks.some(c => c.dataDia === i);
            let dotHtml = temCompromisso ? `<div style="width: 5px; height: 5px; background: var(--fera-orange); border-radius: 50%; position: absolute; bottom: 2px;"></div>` : '';

            grid.innerHTML += `<div class="${classe}" style="position: relative;" onclick="selecionarDia(${i}, this)">
                                  ${i}
                                  ${dotHtml}
                               </div>`;
        }
        atualizarPainelLateral(diaSelecionado);
    }

    // 3. Atualiza a lista lateral com a função de clicar no compromisso
    function atualizarPainelLateral(dia) {
        const dataClique = new Date(anoAtual, mesAtual, dia);
        document.getElementById("tituloDiaCompromisso").innerText = `${dia} de ${meses[mesAtual]}`;
        document.getElementById("subtituloDia").innerText = diasSemana[dataClique.getDay()];

        const lista = document.getElementById("listaCompromissos");
        lista.innerHTML = "";

        let compromissosDoDia = [];
        if (mesAtual === new Date().getMonth()) {
            compromissosDoDia = compromissosMocks.filter(c => c.dataDia === dia);
        }

        if (compromissosDoDia.length === 0) {
            lista.innerHTML = "<p style='color: #888; font-size: 14px;'>Sem compromissos agendados.</p>";
            return;
        }

        compromissosDoDia.forEach(comp => {
            const indexOriginal = compromissosMocks.indexOf(comp);
            lista.innerHTML += `
                <li class="compromisso-card" style="cursor: pointer;" onclick="abrirDetalhes(${indexOriginal})">
                    <div style="display: flex; gap: 10px; align-items: baseline;">
                        <div class="dot-color" style="background-color: ${comp.cor};"></div>
                        <div>
                            <span class="comp-title">${comp.titulo}</span>
                            <span class="comp-time">${comp.horario}</span>
                        </div>
                    </div>
                </li>
            `;
        });
    }

    function selecionarDia(dia, elementoHtml) {
        diaSelecionado = dia;
        document.querySelectorAll('.days-grid .day').forEach(el => el.classList.remove('active'));
        elementoHtml.classList.add('active');
        atualizarPainelLateral(dia);
    }

    function mudarMes(direcao) {
        mesAtual += direcao;
        if (mesAtual < 0) { mesAtual = 11; anoAtual--; }
        else if (mesAtual > 11) { mesAtual = 0; anoAtual++; }
        diaSelecionado = 1;
        renderizarCalendario();
    }

    // 4. Funções do Modal de Criar
    function abrirModalAgendamento() { document.getElementById("modalAgendamento").style.display = "flex"; }
    function fecharModalAgendamento() { document.getElementById("modalAgendamento").style.display = "none"; }

    function salvarAgendamento(event) {
        event.preventDefault();

        const titulo = document.getElementById("inputTitulo").value;
        const descricao = document.getElementById("inputDescricao").value;
        const eventoLocal = document.getElementById("inputEvento").value;
        const dataInput = document.getElementById("inputData").value;
        const horaInicio = document.getElementById("inputHoraInicio").value;
        const horaFim = document.getElementById("inputHoraFim").value;

        const partesData = dataInput.split('-');
        const diaAgendado = parseInt(partesData[2]);
        const mesAgendado = parseInt(partesData[1]) - 1;
        const anoAgendado = parseInt(partesData[0]);

        compromissosMocks.push({
            dataDia: diaAgendado,
            titulo: titulo,
            descricao: descricao || "Sem descrição.",
            evento: eventoLocal,
            horario: `${horaInicio}h - ${horaFim}h`,
            cor: "#C06014"
        });

        if (mesAgendado === mesAtual && anoAgendado === anoAtual) {
            diaSelecionado = diaAgendado;
            renderizarCalendario();
        }

        fecharModalAgendamento();
        document.getElementById("formAgendamento").reset();
    }

    // 5. Funções do Modal de Ler Detalhes
    function abrirDetalhes(index) {
        const comp = compromissosMocks[index];

        document.getElementById("detalheTitulo").innerText = comp.titulo;
        document.getElementById("detalheHorario").innerText = comp.horario;
        document.getElementById("detalheData").innerText = `${comp.dataDia} de ${meses[mesAtual]} de ${anoAtual}`;
        document.getElementById("detalheEvento").innerText = comp.evento || "Não informado";
        document.getElementById("detalheDescricao").innerText = comp.descricao || "Nenhuma descrição adicionada.";

        document.getElementById("modalDetalhes").style.display = "flex";
    }

    function fecharDetalhes() {
        document.getElementById("modalDetalhes").style.display = "none";
    }

    // Inicialização
    renderizarCalendario();
</script>
</body>
</html>
