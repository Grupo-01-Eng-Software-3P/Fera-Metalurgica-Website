<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Catálogo - Fera Metalúrgica</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/catalogo.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="catalogo-page">

<nav class="top-nav top-nav--overlay">
    <div class="logo">
        <h2 style="color: var(--fera-orange);">FERA</h2>
    </div>
    <div class="nav-links">
        <a href="#"><i class="fab fa-facebook"></i></a>
        <a href="https://wa.me/5545999474748"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/metalurgica_fera/"><i class="fab fa-instagram"></i></a>
        <a href="/pedido" class="btn-outline">Meus Orçamentos</a>
        <a href="/login"><i class="fas fa-user-circle"></i> Perfil</a>
    </div>
</nav>

<main class="catalogo-split">

    <aside class="painel-esquerdo">
        <div class="painel-label">
            <span class="label-barra">|</span>
            <span class="label-texto">Ambientes</span>
        </div>
        <div class="letra-decorativa-wrapper">
            <span class="letra-decorativa">F</span>
        </div>
    </aside>

    <section class="painel-direito" style="background-image: url('/imagens/imagem.catalogo.jpg');">
        <div class="painel-direito-overlay"></div>
        <nav class="ambiente-lista">

            <a th:each="cat : ${categorias}"
               th:href="@{'/catalogo/ambiente/' + ${cat.nome}}"
               th:text="${cat.nome}"
               class="ambiente-item">
            </a>

            <span th:if="${categorias == null or #lists.isEmpty(categorias)}"
                  style="color: rgba(255,255,255,0.6); font-size: 14px; font-style: italic;">
                Nenhum ambiente cadastrado ainda.
            </span>

        </nav>
    </section>

</main>

</body>
</html>
