<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Mídia - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/midia.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">Metalúrgica & Móveis</p>

        <ul class="sidebar-menu">
            <li><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="#"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li class="active"><a href="/midia"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamentos"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>

        <div class="sidebar-user">
            <i class="fas fa-user-circle"></i> Lucas Stibbe <i class="fas fa-cog config-icon"></i>
        </div>
    </aside>

    <!-- ÁREA CENTRAL: lista + painel lado a lado -->
    <div class="midia-workspace">

        <!-- LISTA DE CATEGORIAS -->
        <main class="main-content midia-lista" id="midiaLista">
            <div class="page-header">
                <h2 class="page-title">Mídia</h2>
                <div class="header-actions">
                    <div class="search-box">
                        <input type="text" id="inputBusca" onkeyup="filtrarCategorias()" placeholder="Buscar mídia...">
                        <i class="fas fa-search"></i>
                    </div>
                    <button class="btn-brown" onclick="abrirModalCategoria()">+ Nova Categoria</button>
                </div>
            </div>

            <div class="filter-container">
                <button class="filter-pill active" onclick="ativarFiltro(this)">Todas</button>
                <button class="filter-pill" onclick="ativarFiltro(this)">Categorias</button>
                <button class="filter-pill" onclick="ativarFiltro(this)">Produtos</button>
                <button class="filter-pill" onclick="ativarFiltro(this)">Vídeos</button>
            </div>

            <div class="categorias-lista" id="categoriaLista">

                <!-- Cada categoria é gerada pelo Thymeleaf; aqui estão exemplos estáticos -->
                <div class="categoria-item" onclick="abrirPainel(this)"
                     data-nome="Adega"
                     data-descricao="A Adega Bar Bélgica Pt 16 Garrafas Rede Móveis é perfeita para os amantes de vinho que desejam ter uma opção elegante e funcional para armazenar suas garrafas. Com um design moderno e sofisticado, esta adega é fabricada em MDF de alta qualidade, garantindo durabilidade e resistência."
                     data-meta="5MB · faz 2 dias"
                     data-imgs="/imagens/Projeto_Galeria_1.jpeg,/imagens/Projeto_Galeria_2.jpeg,/imagens/Projeto_Galeria_3.jpeg">
                    <div class="categoria-carrossel-wrapper">
                        <button class="carrossel-btn" onclick="rolar(event, this, -1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="carrossel-track">
                            <img src="/imagens/Projeto_Galeria_1.jpeg" alt="Adega 1">
                            <img src="/imagens/Projeto_Galeria_2.jpeg" alt="Adega 2">
                            <img src="/imagens/Projeto_Galeria_3.jpeg" alt="Adega 3">
                        </div>
                        <button class="carrossel-btn" onclick="rolar(event, this, 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="categoria-footer">
                        <span class="categoria-nome"><i class="fas fa-pencil-alt"></i> Adega</span>
                        <span class="categoria-meta">5MB · faz 2 dias</span>
                    </div>
                </div>

                <div class="categoria-item" onclick="abrirPainel(this)"
                     data-nome="Banheiro"
                     data-descricao="Móveis planejados para banheiro com acabamento premium em MDF revestido. Gabinetes, espelheiras e nichos desenvolvidos sob medida para aproveitar cada centímetro do espaço."
                     data-meta="3MB · faz 2 dias"
                     data-imgs="/imagens/Projeto_Galeria_2.jpeg,/imagens/Projeto_Galeria_1.jpeg">
                    <div class="categoria-carrossel-wrapper">
                        <button class="carrossel-btn" onclick="rolar(event, this, -1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="carrossel-track">
                            <img src="/imagens/Projeto_Galeria_2.jpeg" alt="Banheiro 1">
                            <img src="/imagens/Projeto_Galeria_1.jpeg" alt="Banheiro 2">
                        </div>
                        <button class="carrossel-btn" onclick="rolar(event, this, 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="categoria-footer">
                        <span class="categoria-nome"><i class="fas fa-pencil-alt"></i> Banheiro</span>
                        <span class="categoria-meta">3MB · faz 2 dias</span>
                    </div>
                </div>

                <div class="categoria-item" onclick="abrirPainel(this)"
                     data-nome="Biblioteca"
                     data-descricao="Estantes e bibliotecas planejadas para todos os ambientes. Estrutura em aço com prateleiras em MDF, combinando resistência e elegância para organizar seus livros e coleções."
                     data-meta="8MB · faz 2 dias"
                     data-imgs="/imagens/Projeto_Galeria_3.jpeg,/imagens/Projeto_Galeria_1.jpeg,/imagens/Projeto_Galeria_2.jpeg">
                    <div class="categoria-carrossel-wrapper">
                        <button class="carrossel-btn" onclick="rolar(event, this, -1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="carrossel-track">
                            <img src="/imagens/Projeto_Galeria_3.jpeg" alt="Biblioteca 1">
                            <img src="/imagens/Projeto_Galeria_1.jpeg" alt="Biblioteca 2">
                            <img src="/imagens/Projeto_Galeria_2.jpeg" alt="Biblioteca 3">
                        </div>
                        <button class="carrossel-btn" onclick="rolar(event, this, 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="categoria-footer">
                        <span class="categoria-nome"><i class="fas fa-pencil-alt"></i> Biblioteca</span>
                        <span class="categoria-meta">8MB · faz 2 dias</span>
                    </div>
                </div>

                <div class="categoria-item" onclick="abrirPainel(this)"
                     data-nome="Closet"
                     data-descricao="Closets e guarda-roupas sob medida para quartos e áreas de vestuário. Estrutura em aço com painéis em MDF e acabamento laminado de alta durabilidade."
                     data-meta="6MB · faz 2 dias"
                     data-imgs="/imagens/Projeto_Galeria_1.jpeg,/imagens/Projeto_Galeria_3.jpeg">
                    <div class="categoria-carrossel-wrapper">
                        <button class="carrossel-btn" onclick="rolar(event, this, -1)"><i class="fas fa-chevron-left"></i></button>
                        <div class="carrossel-track">
                            <img src="/imagens/Projeto_Galeria_1.jpeg" alt="Closet 1">
                            <img src="/imagens/Projeto_Galeria_3.jpeg" alt="Closet 2">
                        </div>
                        <button class="carrossel-btn" onclick="rolar(event, this, 1)"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="categoria-footer">
                        <span class="categoria-nome"><i class="fas fa-pencil-alt"></i> Closet</span>
                        <span class="categoria-meta">6MB · faz 2 dias</span>
                    </div>
                </div>

            </div>
        </main>

        <!-- PAINEL LATERAL (aparece ao lado, empurrando a lista) -->
        <aside class="midia-painel" id="midiaPainel">
            <button class="painel-fechar" onclick="fecharPainel()"><i class="fas fa-chevron-left"></i></button>

            <div class="painel-conteudo">
                <!-- Imagem destaque + descrição -->
                <div class="painel-topo">
                    <div class="painel-img-destaque-wrapper">
                        <img id="painelImgDestaque" src="" alt="">
                    </div>
                    <div class="painel-info">
                        <h3 id="painelNome"></h3>
                        <p class="painel-label">Descrição</p>
                        <p id="painelDescricao"></p>
                        <p class="painel-meta" id="painelMeta"></p>
                    </div>
                </div>

                <!-- Grade de imagens da categoria -->
                <div class="painel-grade" id="painelGrade"></div>
            </div>
        </aside>

    </div><!-- fim midia-workspace -->
</div><!-- fim dashboard-layout -->


<!-- MODAL NOVA CATEGORIA -->
<div id="modalCategoria" class="modal-form-overlay">
    <div class="modal-form-content">
        <h3 style="color: var(--fera-orange); margin-bottom: 20px;">Nova Categoria</h3>
        <form action="/nova-categoria" method="post">
            <div class="input-group">
                <label>Nome da Categoria:</label>
                <input type="text" name="nome" class="input-field" placeholder="Ex: Sala de Estar" required>
            </div>
            <div class="input-group">
                <label>Descrição:</label>
                <textarea name="descricao" class="input-field" rows="3" placeholder="Descreva esta categoria..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn-secondary-outline" onclick="fecharModalCategoria()">Cancelar</button>
                <button type="submit" class="btn-primary">Criar Categoria</button>
            </div>
        </form>
    </div>
</div>


<script>
    // ── Filtro de pills ──────────────────────────────────────────────
    function ativarFiltro(btn) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }

    // ── Busca ────────────────────────────────────────────────────────
    function filtrarCategorias() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        document.querySelectorAll('.categoria-item').forEach(item => {
            const nome = item.dataset.nome.toLowerCase();
            item.style.display = nome.includes(termo) ? '' : 'none';
        });
    }

    // ── Carrossel ────────────────────────────────────────────────────
    function rolar(event, btn, direcao) {
        event.stopPropagation(); // não abre o painel ao clicar na seta
        const track = btn.closest('.categoria-carrossel-wrapper').querySelector('.carrossel-track');
        track.scrollBy({ left: direcao * 320, behavior: 'smooth' });
    }

    // ── Painel lateral ───────────────────────────────────────────────
    let categoriaAtiva = null;

    function abrirPainel(item) {
        const painel  = document.getElementById('midiaPainel');
        const lista   = document.getElementById('midiaLista');
        const workspace = document.querySelector('.midia-workspace');

        // Destaca item selecionado
        document.querySelectorAll('.categoria-item').forEach(i => i.classList.remove('selecionado'));
        item.classList.add('selecionado');

        // Preenche dados
        const imgs = item.dataset.imgs ? item.dataset.imgs.split(',') : [];
        document.getElementById('painelNome').textContent       = item.dataset.nome;
        document.getElementById('painelDescricao').textContent  = item.dataset.descricao;
        document.getElementById('painelMeta').textContent       = item.dataset.meta;
        document.getElementById('painelImgDestaque').src        = imgs[0] || '';

        // Grade de imagens
        const grade = document.getElementById('painelGrade');
        grade.innerHTML = '';
        imgs.forEach((src, i) => {
            if (i === 0) return; // primeira já é destaque
            const img = document.createElement('img');
            img.src = src;
            img.alt = item.dataset.nome + ' ' + i;
            img.onclick = () => { document.getElementById('painelImgDestaque').src = src; };
            grade.appendChild(img);
        });

        // Abre painel (adiciona classe que aciona o CSS)
        workspace.classList.add('painel-aberto');
        categoriaAtiva = item;
    }

    function fecharPainel() {
        document.querySelector('.midia-workspace').classList.remove('painel-aberto');
        if (categoriaAtiva) categoriaAtiva.classList.remove('selecionado');
        categoriaAtiva = null;
    }

    // ── Modal Nova Categoria ─────────────────────────────────────────
    function abrirModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'flex';
    }
    function fecharModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'none';
    }
    window.onclick = function(e) {
        const m = document.getElementById('modalCategoria');
        if (e.target === m) m.style.display = 'none';
    };
</script>

</body>
</html>
