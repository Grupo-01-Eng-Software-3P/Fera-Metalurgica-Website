<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mídia - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/midia.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">Metalúrgica & Móveis</p>

        <ul class="sidebar-menu">
            <li><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="/agenda"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li class="active"><a href="/midia"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamentos"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li th:if="${usuarioEhAdmin}"><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>

        <div th:replace="~{fragments/sidebar-user :: sidebarUser(${nomeUsuario})}"></div>
    </aside>

    <main class="main-content">

        <div class="midia-header">
            <h2 class="page-title">Mídia</h2>
            <div class="header-actions">
                <div class="search-box">
                    <input type="text" id="inputBusca" onkeyup="filtrarCategorias()" placeholder="Buscar mídia...">
                    <i class="fas fa-search"></i>
                </div>
                <button class="btn-nova-categoria" onclick="abrirModalCategoria()">+ Nova Categoria</button>
            </div>
        </div>

        <div class="filter-container">
            <button class="filter-pill active" onclick="ativarFiltro(this)">Todas</button>
            <button class="filter-pill" onclick="ativarFiltro(this)">Categorias</button>
            <button class="filter-pill" onclick="ativarFiltro(this)">Produtos</button>
        </div>

        <div class="categorias-lista" id="categoriaLista">

            <a th:each="categoria : ${categorias}"
               th:href="@{/midia/{slug}(slug=${categoria.slug})}"
               class="categoria-item">

                <div class="categoria-carrossel-wrapper">
                    <button class="carrossel-btn esq" onclick="rolar(event, this, -1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>

                    <div class="carrossel-track">
                        <th:block th:if="${categoria.midias == null or categoria.midias.isEmpty()}">
                            <img src="/imagens/placeholder.png" alt="Sem imagens">
                        </th:block>

                        <th:block th:unless="${categoria.midias == null or categoria.midias.isEmpty()}">
                            <img th:each="midia : ${categoria.midias}"
                                 th:src="${midia.caminho}"
                                 th:alt="${midia.nome}">
                        </th:block>
                    </div>

                    <button class="carrossel-btn dir" onclick="rolar(event, this, 1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <div class="categoria-footer">
                    <span class="categoria-nome">
                        <i class="fas fa-pencil-alt"></i>
                        <span th:text="${categoria.nome}">Nome</span>
                    </span>
                    <span class="categoria-meta"
                          th:text="${categoria.midias != null ? categoria.midias.size() + ' arquivo(s)' : '0 arquivo(s)'}">
                    </span>
                </div>
            </a>

            <p th:if="${categorias == null or categorias.isEmpty()}"
               style="color: var(--text-muted); padding: 20px;">
                Nenhuma categoria cadastrada ainda.
            </p>

        </div>
    </main>
</div>

<div id="modalCategoria" class="modal-form-overlay">
    <div class="modal-form-content">
        <h3 style="color: var(--fera-orange); margin-bottom: 20px;">Nova Categoria</h3>

        <form th:action="@{/nova-categoria}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <div class="input-group">
                <label>Nome da Categoria:</label>
                <input type="text" name="nome" class="input-field" placeholder="Ex: Sala de Estar" required>
            </div>
            <div class="input-group">
                <label>Descrição:</label>
                <textarea name="descricao" class="input-field" rows="3" placeholder="Descreva esta categoria..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn-secondary-outline" onclick="fecharModalCategoria()">Cancelar</button>
                <button type="submit" class="btn-primary">Criar Categoria</button>
            </div>
        </form>
    </div>
</div>

<script>
    function ativarFiltro(btn) {
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
    }

    function filtrarCategorias() {
        const termo = document.getElementById('inputBusca').value.toLowerCase();
        document.querySelectorAll('.categoria-item').forEach(item => {
            const nome = item.querySelector('.categoria-nome').textContent.toLowerCase();
            item.style.display = nome.includes(termo) ? '' : 'none';
        });
    }

    function rolar(event, btn, direcao) {
        event.preventDefault();
        event.stopPropagation();
        const track = btn.closest('.categoria-carrossel-wrapper').querySelector('.carrossel-track');
        track.scrollBy({ left: direcao * track.offsetWidth, behavior: 'smooth' });
    }

    function abrirModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'flex';
    }
    function fecharModalCategoria() {
        document.getElementById('modalCategoria').style.display = 'none';
    }
    window.onclick = function(e) {
        const m = document.getElementById('modalCategoria');
        if (e.target === m) m.style.display = 'none';
    };
</script>

</body>
</html>
