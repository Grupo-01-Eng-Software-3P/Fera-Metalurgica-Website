<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Fera</title>
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:href="@{/css/pages/dashboard.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="dashboard-layout">
    <aside class="sidebar">
        <h2>Fera</h2>
        <p style="font-size: 12px; margin-bottom: 30px;">Metalúrgica & Móveis</p>

        <ul class="sidebar-menu">
            <li class="active"><a href="/dashboard"><i class="fas fa-home"></i> Início</a></li>
            <li><a href="/agenda"><i class="fas fa-calendar-alt"></i> Agenda</a></li>
            <li><a href="/midia"><i class="fas fa-image"></i> Mídia</a></li>
            <li><a href="/orcamentos"><i class="fas fa-file-invoice"></i> Orçamentos</a></li>
            <li th:if="${usuarioEhAdmin}"><a href="/usuarios"><i class="fas fa-user"></i> Usuários</a></li>
        </ul>

        <div th:replace="~{fragments/sidebar-user :: sidebarUser(${nomeUsuario})}"></div>
    </aside>

    <main class="main-content">
        <div style="margin-bottom: 40px;">
            <h2 style="color: var(--fera-orange);">Início</h2>
        </div>

        <div class="cards-grid">
            <div class="card">
                <div>
                    <h3 th:text="${orcamentosMes}">0</h3>
                    <p>Orçamentos este mês</p>
                </div>
            </div>
            <div class="card">
                <div>
                    <h3 th:text="${orcamentosConcluidos}">0</h3>
                    <p>Projetos Concluídos</p>
                </div>
            </div>
        </div>

        <div class="table-container">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #666;">Atividades recentes</h3>
                <a href="/agenda" style="font-weight: bold;">Ver Tudo</a>
            </div>

            <ul class="atividade-list">
                <li th:each="a : ${atividades}">
                    <div class="atividade-left">
                        <span class="dot-orange"></span>
                        <span th:text="${a.descricao}"></span>
                    </div>
                    <span class="atividade-time" th:text="${a.horario}"></span>
                </li>
                <li th:if="${#lists.isEmpty(atividades)}"
                    style="color: #aaa; font-size: 14px; padding: 20px 0;">
                    Nenhuma atividade registrada ainda.
                </li>
            </ul>
        </div>
    </main>
</div>

</body>
</html>
